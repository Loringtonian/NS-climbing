<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Back the wall — any chain</title>
    <style>
      :root {
        --bg:#0e1116; --panel:#161b22; --ink:#f2f4f7; --muted:#9aa4b2;
        --accent:#ff6b4a; --accent2:#ffb24a; --green:#7fe0b2; --line:#262c36;
      }
      * { box-sizing:border-box; margin:0; padding:0; }
      body {
        background:var(--bg); color:var(--ink);
        font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
        -webkit-font-smoothing:antialiased; min-height:100vh;
      }
      .wrap { max-width:440px; margin:0 auto; padding:0 20px 48px; }
      .hero {
        position:relative; margin:0 -20px 22px; padding:40px 24px 26px; min-height:230px;
        display:flex; flex-direction:column; justify-content:flex-end; overflow:hidden;
        background:linear-gradient(180deg,rgba(14,17,22,.35),rgba(14,17,22,.92)),
          url(https://loringtonian.github.io/NS-climbing/assets/bg_wall.jpg) center/cover no-repeat #1b1f27;
      }
      .eyebrow { display:inline-block; align-self:flex-start; background:rgba(255,178,74,.16);
        color:var(--accent2); font-weight:700; font-size:11px; letter-spacing:.09em;
        text-transform:uppercase; padding:6px 11px; border-radius:999px; margin-bottom:12px; }
      h1 { font-size:29px; line-height:1.1; letter-spacing:-.02em; font-weight:800; }
      h1 span { color:var(--accent); }
      .lede { color:#cdd4de; font-size:15px; margin-top:12px; }
      .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px; }
      .stack { display:grid; gap:12px; }
      .row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
      .chip { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px;
        color:#c7cfda; background:#11151b; border:1px solid var(--line); padding:5px 10px; border-radius:999px; }
      .label { font-size:12px; color:var(--muted); letter-spacing:.02em; }
      .bal { font-size:30px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:2px; }
      .btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
        padding:15px 18px; border-radius:999px; border:0; cursor:pointer; font:inherit;
        font-weight:800; font-size:16px; background:var(--accent); color:#0e1116;
        transition:transform .08s ease, filter .12s ease, opacity .12s; }
      .btn:hover:not(:disabled) { filter:brightness(1.06); }
      .btn:active:not(:disabled) { transform:scale(.985); }
      .btn:disabled { opacity:.4; cursor:default; }
      .btn.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); font-weight:700; }
      .btn.ghost:hover:not(:disabled) { border-color:#3a424f; filter:none; }
      .tier { background:#11151b; border:1px solid var(--line); color:var(--ink); text-align:left;
        justify-content:space-between; font-weight:700; }
      .tier .amt { font-weight:900; font-variant-numeric:tabular-nums; }
      .tier:hover:not(:disabled) { border-color:var(--accent); filter:none; }
      .link { background:none; border:0; color:var(--muted); text-decoration:underline;
        cursor:pointer; font:inherit; font-size:13px; padding:0; }
      .link:hover { color:var(--ink); }
      .fine { font-size:12.5px; color:var(--muted); }
      .status { color:var(--accent2); font-size:14px; word-break:break-all; }
      .sep { border:0; border-top:1px solid var(--line); margin:6px 0; }
      .brandnote { display:flex; align-items:center; justify-content:center; gap:6px;
        color:#6b7482; font-size:12px; margin-top:10px; }
      .spin { width:14px; height:14px; border:2px solid rgba(255,255,255,.25);
        border-top-color:var(--accent2); border-radius:50%; display:inline-block;
        animation:sp .7s linear infinite; }
      @keyframes sp { to { transform:rotate(360deg); } }
    </style>
    <script type="module" crossorigin src="/NS-climbing/anychain/assets/index-CHmsZGMe.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
