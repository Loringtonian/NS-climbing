[toolchain]
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.localnet]
ns_climb_escrow = "42P4j432MkNbPRJAKTpMJDa1LpfBWAWZhZxAxtY35FsD"

