<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>We want a climbing wall at Network School</title>

<meta name="robots" content="noindex,nofollow">

<meta property="og:title" content="We want a climbing wall at Network School">
<meta property="og:description" content="22 people at NS, asking. A petition where the signatures are money.">
<meta property="og:image" content="https://loringtonian.github.io/NS-climbing/media/campaign-poster.jpg">
<meta property="og:video" content="https://loringtonian.github.io/NS-climbing/media/climbing-campaign.mp4">
<meta property="og:video:type" content="video/mp4">
<meta property="og:video:width" content="1080">
<meta property="og:video:height" content="1080">
<meta property="og:url" content="https://loringtonian.github.io/NS-climbing/watch.html">
<meta property="og:type" content="video.other">
<meta name="twitter:card" content="player">
<meta name="twitter:title" content="We want a climbing wall at Network School">
<meta name="twitter:description" content="22 people at NS, asking. A petition where the signatures are money.">
<meta name="twitter:image" content="https://loringtonian.github.io/NS-climbing/media/campaign-poster.jpg">
<meta name="twitter:player" content="https://loringtonian.github.io/NS-climbing/watch.html">
<meta name="twitter:player:width" content="1080">
<meta name="twitter:player:height" content="1080">

<link rel="icon" href="favicon.ico">
<style>
  :root{
    --ink:#e8ecf1; --muted:#96a2b0; --accent:#ff6b4a; --line:#262c36;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; padding:28px 20px;
    background:linear-gradient(rgba(10,12,16,.88),rgba(10,12,16,.94)),
               url(assets/bg_wall.jpg) center/cover no-repeat #0e1116;
    color:var(--ink);
    font:17px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1{
    font-size:clamp(1.15rem,4vw,1.6rem); font-weight:650; letter-spacing:-.02em;
    margin:0; text-align:center; text-wrap:balance;
  }
  video{
    width:min(560px,100%); aspect-ratio:1; border-radius:14px; display:block;
    background:#000; border:1px solid var(--line);
    box-shadow:0 20px 60px -24px rgba(0,0,0,.9);
  }
  .links{display:flex; gap:10px; flex-wrap:wrap; justify-content:center}
  a.cta{
    display:inline-block; padding:12px 20px; border-radius:10px;
    background:var(--accent); color:#12161c; font-weight:650; text-decoration:none;
  }
  a.alt{
    display:inline-block; padding:12px 20px; border-radius:10px;
    border:1px solid var(--line); color:var(--ink); text-decoration:none;
  }
  a.cta:hover{filter:brightness(1.07)}
  a.alt:hover{border-color:var(--accent)}
  a:focus-visible{outline:2px solid var(--accent); outline-offset:3px}
  p.sub{color:var(--muted); margin:0; text-align:center; font-size:.92rem}
</style>
</head>
<body>
  <h1>We want a climbing wall at Network School</h1>
  <video controls playsinline preload="metadata"
         poster="media/campaign-poster.jpg"
         src="media/climbing-campaign.mp4"></video>
  <p class="sub">A petition where the signatures are money.</p>
  <div class="links">
    <a class="cta" href="https://tinyurl.com/sendclimbing">Back the wall</a>
    <a class="alt" href="https://tinyurl.com/sendcheer">Cheer (free)</a>
  </div>
</body>
</html>
